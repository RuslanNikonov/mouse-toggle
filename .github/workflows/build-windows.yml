name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pynput

      - name: Build Console EXE
        run: pyinstaller --onefile --name MouseToggle-Console mouse_toggle.py

      - name: Build GUI EXE
        run: pyinstaller --onefile --noconsole --name MouseToggle-GUI mouse_toggle_gui.py

      - name: Upload Console artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseToggle-Console
          path: dist/MouseToggle-Console.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseToggle-GUI
          path: dist/MouseToggle-GUI.exe
